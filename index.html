<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Kiaan's Live Chat 💬</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f2f5; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        #chat-container { width: 100%; max-width: 400px; background: white; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); overflow: hidden; }
        #header { background: #075e54; color: white; padding: 15px; font-size: 20px; font-weight: bold; text-align: center; }
        #chat-box { height: 400px; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; background: #e5ddd5; }
        .msg { padding: 8px 12px; border-radius: 10px; max-width: 80%; word-wrap: break-word; font-size: 14px; background: white; align-self: flex-start; box-shadow: 0 1px 2px rgba(0,0,0,0.1); }
        #input-area { display: flex; padding: 10px; background: #f0f0f0; border-top: 1px solid #ddd; }
        input { flex: 1; border: none; padding: 10px; border-radius: 20px; outline: none; }
        button { background: #075e54; color: white; border: none; padding: 10px 20px; border-radius: 20px; margin-left: 10px; cursor: pointer; font-weight: bold; }
        button:hover { background: #128c7e; }
    </style>
</head>
<body>

<div id="chat-container">
    <div id="header">Kiaan's Global Chat</div>
    <div id="chat-box" id="chatBox"></div>
    <div id="input-area">
        <input type="text" id="messageInput" placeholder="Type a message...">
        <button id="sendBtn">Send</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, push, onChildAdded } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCoQCJp6Zg3oselNh1I9qdm9zD_aIk0bJA",
      authDomain: "chatwebsite-bd070.firebaseapp.com",
      databaseURL: "https://chatwebsite-bd070-default-rtdb.firebaseio.com",
      projectId: "chatwebsite-bd070",
      storageBucket: "chatwebsite-bd070.firebasestorage.app",
      messagingSenderId: "1028584757377",
      appId: "1:1028584757377:web:7c7e4e163ca370d2d15580"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const messagesRef = ref(db, 'messages');

    // --- PERSONALIZATION LOGIC ---
    // Check if we already know this user. If not, ask and pick a color.
    let myName = localStorage.getItem('chat_name');
    let myColor = localStorage.getItem('chat_color');

    if (!myName) {
        myName = prompt("Enter your name to join the chat:") || "Guest";
        localStorage.setItem('chat_name', myName);
        
        const colors = ['#FFD1DC', '#B3E5BE', '#AEC6CF', '#F49AC2', '#FFB347', '#CB99C9', '#97CAEF', '#E6E6FA'];
        myColor = colors[Math.floor(Math.random() * colors.length)];
        localStorage.setItem('chat_color', myColor);
    }

    const chatBox = document.getElementById('chat-box');
    const messageInput = document.getElementById('messageInput');
    const sendBtn = document.getElementById('sendBtn');

    sendBtn.addEventListener('click', () => {
        const text = messageInput.value;
        if (text.trim() !== "") {
            push(messagesRef, {
                text: text,
                user: myName,
                color: myColor, // Send the signature color with the message
                timestamp: Date.now()
            });
            messageInput.value = "";
        }
    });

    onChildAdded(messagesRef, (data) => {
        const msgData = data.val();
        const msgDiv = document.createElement('div');
        msgDiv.classList.add('msg');
        
        // Show the name on top, then the text
        msgDiv.innerHTML = `<b style="font-size: 10px; display: block; margin-bottom: 3px;">${msgData.user}</b>${msgData.text}`;
        
        // Use the color that was sent with the message
        msgDiv.style.backgroundColor = msgData.color || '#white';
        
        chatBox.appendChild(msgDiv);
        chatBox.scrollTop = chatBox.scrollHeight;
    });

    messageInput.addEventListener("keypress", (e) => { if (e.key === "Enter") sendBtn.click(); });
</script>

</body>
</html>
